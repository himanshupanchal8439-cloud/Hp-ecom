<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HIM-STORE — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .admin-wrap{ padding: 32px clamp(16px,3vw,48px) 80px; }
  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:16px; }
  table{ width:100%; min-width:640px; border-collapse:collapse; font-size:.9rem; }
  th,td{ text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  th{ text-transform:uppercase; font-size:.7rem; letter-spacing:.08em; opacity:.6; white-space:nowrap; }
  td img{ width:40px; height:52px; object-fit:cover; }
  .row-actions{ display:flex; gap:8px; }
  .row-actions button{ background:none; border:1px solid var(--line); color:inherit; padding:4px 10px; cursor:pointer; font-size:.75rem; border-radius:999px; white-space:nowrap; }
  .row-actions button.danger{ color:var(--signal); border-color:var(--signal); }
  select{ background:var(--bg); color:var(--fg); border:1px solid var(--line); padding:6px; font-family:inherit; }
  .tabbar{ display:flex; gap:10px; margin-top:24px; }
  .tabbar button{ background:none; border:1px solid var(--line); color:inherit; padding:8px 16px; cursor:pointer; border-radius:999px; text-transform:uppercase; font-size:.75rem; letter-spacing:.08em; }
  .tabbar button.active{ background:var(--fg); color:var(--bg); }
  .tabpane{ display:none; }
  .tabpane.active{ display:block; }
  .grid-form{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:20px; padding:16px; border:1px solid var(--line); }
  .grid-form .field{ margin:0; }
  .grid-form .full-btn{ grid-column:span 2; }
  .locked{ padding:60px 0; text-align:center; }

  /* This page has no hamburger/drawer toggle, so undo style.css's shared
     mobile nav-right treatment (position:fixed off-canvas panel) — without
     that override it sits permanently translated off-screen, inflating the
     page's scrollable width and making admin content unreachable on mobile. */
  @media (max-width:900px){
    .nav-right{
      position:static !important; width:auto !important; height:auto !important;
      transform:none !important; background:none !important;
      -webkit-backdrop-filter:none !important; backdrop-filter:none !important;
      flex-direction:row !important; padding:0 !important; gap:12px;
      mix-blend-mode:normal;
    }
  }

  @media (max-width:700px){
    .admin-wrap{ padding: 24px 16px 64px; }
    h1.serif{ font-size:1.5rem !important; }
    nav{ flex-wrap:wrap; row-gap:8px; }
    .wordmark{ white-space:nowrap; font-size:1.1rem; }
    .nav-right{ gap:12px; font-size:.8rem; }
    .tabbar{ gap:8px; }
    .tabbar button{ padding:7px 12px; font-size:.68rem; }
    .grid-form{ grid-template-columns:1fr; padding:14px; }
    .grid-form .full-btn, .grid-form div[style*="span 2"]{ grid-column:span 1 !important; }
    #lockedMsg form{ max-width:none !important; }
    .row-actions{ flex-wrap:wrap; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="wordmark">HIM-STORE</a>
  <div class="nav-right">
    <span id="adminUser" style="opacity:.85"></span>
    <div class="dots" id="themeDots">
      <div class="dot" data-t="cream"></div>
      <div class="dot" data-t="dark"></div>
      <div class="dot" data-t="red"></div>
    </div>
  </div>
</nav>

<main class="admin-wrap">
  <h1 class="serif" style="font-size:2rem; margin-bottom:4px;">Admin Dashboard</h1>
  <p style="opacity:.6; margin-top:0;">Manage products, stock and orders.</p>

  <div id="lockedMsg" class="locked" style="display:none;">
    <form id="adminLoginForm" style="max-width:360px; margin:0 auto; text-align:left;">
      <div class="field">
        <label for="adminEmail">Email</label>
        <input id="adminEmail" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" required />
      </div>
      <div class="form-msg" id="adminLoginMsg"></div>
      <button class="full-btn" type="submit">Sign in as admin</button>
    </form>
  </div>

  <div id="adminContent" style="display:none;">
    <div class="tabbar">
      <button class="tab-btn active" data-tab="products">Products</button>
      <button class="tab-btn" data-tab="orders">Orders</button>
    </div>

    <div class="tabpane active" id="tab-products">
      <div class="table-scroll">
        <table>
          <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Discount</th><th>Stock</th><th></th></tr></thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>

      <form class="grid-form" id="productForm">
        <input type="hidden" id="pId" />
        <div class="field"><label>Name</label><input id="pName" required /></div>
        <div class="field"><label>Category</label><input id="pCategory" required /></div>
        <div class="field"><label>Price (₹)</label><input id="pPrice" type="number" min="0" step="1" required /></div>
        <div class="field"><label>Stock qty</label><input id="pStock" type="number" min="0" step="1" required /></div>
        <div class="field"><label>MRP / original price (₹, optional)</label><input id="pMrp" type="number" min="0" step="1" /></div>
        <div class="field"><label>Discount % (optional)</label><input id="pDiscount" type="number" min="0" max="90" step="1" /></div>
        <div class="field"><label>Front image URL</label><input id="pFront" required /></div>
        <div class="field"><label>Back image URL</label><input id="pBack" required /></div>
        <div class="field" style="grid-column:span 2;"><label>Description</label><input id="pDesc" /></div>
        <div class="form-msg" id="productMsg" style="grid-column:span 2;"></div>
        <button class="full-btn" type="submit" id="productSubmit">Add product</button>
        <button class="ghost-btn" type="button" id="productCancel" style="grid-column:span 2; display:none;">Cancel edit</button>
      </form>
    </div>

    <div class="tabpane" id="tab-orders">
      <div class="table-scroll">
        <table>
          <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th></tr></thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
