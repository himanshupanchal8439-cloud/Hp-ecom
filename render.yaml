databases:
  - name: himstore-db
    plan: free

services:
  - type: web
    name: himstore-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: himanshupanchal8439@gmail.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: himstore-db
          property: connectionString
